spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  main:
    allow-bean-definition-overriding: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

  quartz:
    job-store-type: memory
    auto-startup: false

  mail:
    host: localhost
    port: 3025


telegram:
  bot:
    token: "test_token"
    username: "test_bot"

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyForJwtTokenGenerationAndValidationMustBeLongEnoughForHS5121234567890}
  expiration: 3600000