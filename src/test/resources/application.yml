spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  liquibase:
    enabled: false

  quartz:
    job-store-type: memory
    auto-startup: false

  mail:
    host: localhost
    port: 2525
    username: test
    password: test

telegram:
  bot:
    token: "test_token"
    username: "test_bot"

jwt:
  secret: mySuperSecretKeyForJwtTokenGenerationAndValidationMustBeLongEnoughForHS5121234567890
  expiration: 86400000