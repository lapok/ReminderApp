version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reminder-postgres
    environment:
      POSTGRES_DB: reminder_db
      POSTGRES_USER: reminder_user
      POSTGRES_PASSWORD: reminder_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: